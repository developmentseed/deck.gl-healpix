name: Deploy Docs

on:
  push:
    tags:
      - "v*"
      - "!v*-alpha*"
      - "!v*-beta*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  VITE_MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm i

      - name: Build packages
        run: npm run build -- --scope '@developmentseed/*'

      - name: Build Home
        run: |
          mkdir -p dist
          echo "Building example: Home"
          cd examples/_home
          cp .env.example .env
          export VITE_BASE_URL=https://deck.gl-healpix.ds.io
          npm run build
          cd ../..
          echo "Preparing Home"
          cp -r "examples/_home/dist/." "dist/"

      - name: Build examples
        run: |
          mkdir -p dist/examples
          for dir in examples/*/; do
            example=$(basename "$dir")
            if [[ "$example" == _* ]]; then
              continue
            fi

            echo "Building example: $example"
            cd $dir
            cp .env.example .env
            export VITE_BASE_URL=https://deck.gl-healpix.ds.io/examples/$example
            npm run build
            cd ../..
            echo "Copying example: $example"
            mkdir -p "dist/examples/${example}"
            cp -r "${dir}dist/." "dist/examples/${example}/"
          done

      - name: Copy 404.html
        run: cp examples/_shared/404.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
