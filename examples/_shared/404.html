<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect.
      // Encodes the current path into a query param and redirects to the
      // app root, which decodes it and calls history.replaceState.
      // pathSegmentsToKeep = 2 keeps /examples/<name> so the redirect lands
      // on the correct app's index.html (e.g. /examples/sandbox/?/color).
      (function () {
        var l = window.location;
        var pathSegmentsToKeep = 2;
        var base = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var rest = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
        l.replace(
          l.protocol +
            '//' +
            l.host +
            base +
            '/?/' +
            rest.replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
